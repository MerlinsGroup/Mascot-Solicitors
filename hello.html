<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="
viewport" content="width=device-width, initial-scale=1.0">
<title>Mascot Solicitors — Screen Display</title>
<style>
  :root{
    --red:#DC0000;   /* matches the logo image background exactly */
    --ink:#141414;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;font-family:Georgia,'Times New Roman',serif;background:var(--red);overflow:hidden;}

  .screen{
    display:flex;flex-direction:column;
    width:100vw;height:100vh;
    overflow:hidden;
  }

  /* ---------- Hero (red) — the mascot logo, super-sized & seamless ---------- */
  /* The logo image's own background is the same red, so it blends with no
     visible edges; sized to 115% so the wordmark fills the hero. */
  .hero{
    flex:1 1 auto;
    min-height:0;
    background-color:var(--red);
    background-image:url('mascotsolicitors.jpg');
    background-repeat:no-repeat;
    background-position:center;
    background-size:104% auto;   /* ~10% smaller than before (was 115%) */
  }

  /* ---------- Details band (dark) — kept slim so the white hero above
     takes up the large majority of the page ---------- */
  .details{
    flex:0 0 auto;
    background:var(--ink);
    color:#fff;
    border-top:6px solid var(--red);
    text-align:center;
    padding:clamp(14px,2.2vh,30px) 5vw clamp(16px,2.6vh,36px);
    display:flex;flex-direction:column;align-items:center;
  }

  /* ---------- Services ---------- */
  .services-title{
    font-size:clamp(15px,1.6vw,26px);
    text-transform:uppercase;
    letter-spacing:4px;
    opacity:0.6;
    margin-bottom:0.65em;
  }
  /* Two columns x three rows — fills the LEFT column first, then the RIGHT. */
  .services{
    list-style:none;
    display:grid;
    grid-auto-flow:column;
    grid-template-rows:repeat(3,auto);
    justify-content:center;
    column-gap:clamp(36px,6vw,120px);
    row-gap:clamp(6px,1.1vh,14px);
    text-align:left;
    line-height:1.12;
    font-size:clamp(18px,2.1vw,32px);
  }
  .services li{
    position:relative;
    padding-left:1.4em;
  }
  .services li::before{
    content:"";
    position:absolute;
    left:0;top:.55em;
    width:.32em;height:.32em;
    border-radius:50%;
    background:var(--red);
  }

  /* ---------- Divider ---------- */
  .divider{
    width:min(520px,60%);
    height:1px;
    background:rgba(255,255,255,.18);
    margin:clamp(11px,1.7vh,22px) 0;
  }

  /* ---------- Contact details (with icons) ---------- */
  .contacts{
    display:flex;flex-direction:column;
    align-items:center;
    gap:clamp(8px,1.2vh,16px);
    font-size:clamp(17px,2vw,30px);
    letter-spacing:.5px;
  }
  .c-row{
    display:flex;flex-wrap:wrap;
    justify-content:center;align-items:center;
    gap:clamp(18px,3vw,56px);
  }
  .c-item{
    display:inline-flex;
    align-items:center;
    gap:.55em;
    white-space:nowrap;
  }
  .c-item.addr{white-space:normal;max-width:92vw;text-align:center;line-height:1.3;}

  /* Inline icons — brand red, sized to the text */
  .ico{
    width:1em;height:1em;
    flex:0 0 auto;
    fill:var(--red);
    display:block;
  }
</style>
</head>
<body>

  <!-- Reusable icon set (drawn once, referenced via <use>) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <symbol id="ic-phone" viewBox="0 0 24 24">
      <path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.02-.24 11.36 11.36 0 0 0 3.57.57 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.36 11.36 0 0 0 .57 3.57 1 1 0 0 1-.24 1.02l-2.2 2.2z"/>
    </symbol>
    <symbol id="ic-mobile" viewBox="0 0 24 24">
      <path d="M17 1H7a2 2 0 0 0-2 2v18a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2zm-5 21a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5zM17 18H7V4h10v14z"/>
    </symbol>
    <symbol id="ic-whatsapp" viewBox="0 0 24 24">
      <path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2zm0 18.13h-.01a8.2 8.2 0 0 1-4.18-1.15l-.3-.18-3.12.82.83-3.04-.2-.31a8.2 8.2 0 0 1-1.26-4.38c0-4.54 3.7-8.23 8.24-8.23 2.2 0 4.27.86 5.82 2.42a8.18 8.18 0 0 1 2.41 5.82c0 4.54-3.69 8.23-8.23 8.23zm4.52-6.16c-.25-.12-1.47-.72-1.69-.8-.23-.09-.39-.12-.56.12-.16.25-.64.81-.79.97-.14.17-.29.19-.54.06-.25-.12-1.05-.39-1.99-1.23-.74-.66-1.23-1.47-1.38-1.72-.14-.25-.01-.38.11-.5.11-.11.25-.29.37-.43.13-.14.17-.25.25-.41.08-.17.04-.31-.02-.43-.06-.12-.56-1.34-.76-1.84-.2-.48-.4-.42-.56-.43h-.48c-.17 0-.43.06-.66.31-.22.25-.86.85-.86 2.07 0 1.22.89 2.4 1.01 2.56.12.17 1.75 2.67 4.23 3.74.59.26 1.05.41 1.41.52.59.19 1.13.16 1.56.1.48-.07 1.47-.6 1.68-1.18.21-.58.21-1.07.14-1.18-.06-.1-.22-.16-.47-.28z"/>
    </symbol>
    <symbol id="ic-globe" viewBox="0 0 24 24">
      <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm6.93 6h-2.95a15.6 15.6 0 0 0-1.38-3.56A8.03 8.03 0 0 1 18.93 8zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14a7.96 7.96 0 0 1 0-4h3.38a16.6 16.6 0 0 0 0 4H4.26zm.81 2h2.95c.32 1.25.78 2.45 1.38 3.56A8.03 8.03 0 0 1 5.07 16zm2.95-8H5.07a8.03 8.03 0 0 1 4.33-3.56A15.6 15.6 0 0 0 8.02 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66a14.7 14.7 0 0 1 0-4h4.68a14.7 14.7 0 0 1 0 4zm.26 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95a8.03 8.03 0 0 1-4.33 3.56zM16.36 14a16.6 16.6 0 0 0 0-4h3.38a7.96 7.96 0 0 1 0 4h-3.38z"/>
    </symbol>
    <symbol id="ic-pin" viewBox="0 0 24 24">
      <path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/>
    </symbol>
  </svg>

  <div class="screen">

    <!-- Red hero with the large mascot logo (image) -->
    <div class="hero" role="img" aria-label="mascot — Mascot Solicitors"></div>

    <!-- Dark band with all the text & contact details -->
    <div class="details">
      <div class="services-title">Services We Provide</div>
      <ul class="services">
        <li>Immigration &amp; Nationality</li>
        <li>Family</li>
        <li>Wills &amp; Probate</li>
        <li>Landlord &amp; Tenant</li>
        <li>Litigation</li>
        <li>Commercial &amp; Corporate Services</li>
      </ul>

      <div class="divider"></div>

      <div class="contacts">
        <div class="c-row">
          <span class="c-item"><svg class="ico"><use href="#ic-phone"/></svg>+44 2080 752 860</span>
          <span class="c-item"><svg class="ico"><use href="#ic-mobile"/></svg><svg class="ico"><use href="#ic-whatsapp"/></svg>+44 7741 535063</span>
        </div>
        <div class="c-row">
          <span class="c-item"><svg class="ico"><use href="#ic-globe"/></svg>www.mascotsolicitors.co.uk</span>
        </div>
        <div class="c-row">
          <span class="c-item addr"><svg class="ico"><use href="#ic-pin"/></svg>Suite 45, The Wenta Business Centre, 1 Electric Avenue, Enfield, Middlesex EN3 7XU</span>
        </div>
      </div>
    </div>

  </div>

<script>
  // Press F for fullscreen (handy on a presentation screen)
  document.addEventListener('keydown', function(e){
    if(e.key.toLowerCase() === 'f'){
      if(!document.fullscreenElement){ document.documentElement.requestFullscreen(); }
      else { document.exitFullscreen(); }
    }
  });
</script>
</body>
</html>
